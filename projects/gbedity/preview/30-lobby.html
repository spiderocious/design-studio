<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gbedity · Lobby</title>
<link rel="stylesheet" href="_foundation.css" />
<style>
  body { padding: 40px; background: var(--canvas); min-height: 100vh; }
  .wrap { max-width: 880px; margin: 0 auto; }
  .scene-h {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
    margin: 0 0 14px;
  }
  .lobby-card {
    background: var(--surface);
    border-radius: 28px;
    padding: 32px 36px;
    position: relative;
    overflow: hidden;
  }
  .lobby-grid {
    display: grid; grid-template-columns: 170px 1fr; gap: 22px; align-items: center;
    margin-bottom: 28px;
  }
  .qr-block {
    background: var(--ink); color: #fff;
    border-radius: 18px; padding: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .qr-block .qr {
    width: 120px; height: 120px;
    background:
      conic-gradient(from 45deg, #fff 0 25%, transparent 0 50%, #fff 0 75%, transparent 0 100%) 0 0/16px 16px,
      #fff;
    border-radius: 10px; opacity: 0.95;
  }
  .qr-block .code {
    font-family: var(--sans); font-weight: 800; letter-spacing: 0.18em;
    font-size: 15px; color: #fff;
  }
  .room-headline {
    font-family: var(--serif); font-weight: 600;
    font-variation-settings: var(--fraunces-soft-display);
    font-size: 44px; letter-spacing: -0.03em; line-height: 1.05;
    color: var(--ink); margin: 0 0 8px;
  }
  .room-sub { font-size: 14px; color: var(--ink-3); margin: 0; }

  .brand-mark {
    position: absolute;
    top: 22px; right: 22px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-mark svg { width: 44px; height: 44px; }
  .brand-svg path { fill: var(--accent); stroke: var(--ink); stroke-width: 2; stroke-linejoin: round; }

  .av {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; flex-shrink: 0;
  }
  .av.b1 { background: var(--stage); }
  .av.b2 { background: var(--special); }
  .av.b3 { background: var(--info); color: var(--ink); }

  .row-warm {
    display: grid; grid-template-columns: 44px 1fr auto;
    gap: 14px; align-items: center;
    padding: 14px 18px;
    background: var(--canvas);
    border-radius: 16px;
  }
  .row-warm + .row-warm { margin-top: 10px; }
  .row-warm .name { font-weight: 700; font-size: 16px; color: var(--ink); }
  .row-warm .meta-text { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

  .actions {
    margin-top: 28px;
    display: flex; gap: 12px;
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="scene-h">Surface · Initial lobby (display + host phone)</p>

  <div class="lobby-card">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 36 36" class="brand-svg">
        <path d="M18 3 L22 13 L33 14 L25 21 L28 32 L18 26 L8 32 L11 21 L3 14 L14 13 Z"/>
        <circle cx="18" cy="18" r="3" fill="#1F6B4A" stroke="none"/>
      </svg>
    </div>

    <div class="lobby-grid">
      <div class="qr-block">
        <div class="qr"></div>
        <div class="code">GBE-4ZK</div>
      </div>
      <div>
        <p class="room-headline">Friday game night</p>
        <p class="room-sub">Scan or type the code · gbedity.app/join · 3 players in the room</p>
      </div>
    </div>

    <div>
      <div class="row-warm">
        <div class="av">T</div>
        <div><div class="name">Tobi</div><div class="meta-text">Joined 1m ago</div></div>
        <span class="pill pill-action">Ready</span>
      </div>
      <div class="row-warm">
        <div class="av b2">A</div>
        <div><div class="name">Ada</div><div class="meta-text">Joined 42s ago</div></div>
        <span class="pill pill-action">Ready</span>
      </div>
      <div class="row-warm">
        <div class="av b3">F</div>
        <div><div class="name">Funmi</div><div class="meta-text">Joined 12s ago</div></div>
        <span class="pill pill-info">Choosing name</span>
      </div>
      <div class="row-warm" style="opacity: 0.55;">
        <div class="av" style="background: var(--ink-5); color: var(--ink-3);">+</div>
        <div><div class="name" style="color: var(--ink-3);">Open seat</div><div class="meta-text">Scan QR or type GBE-4ZK</div></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary btn-lg">Start game</button>
      <button class="btn btn-ghost btn-lg">Configure</button>
    </div>
  </div>

</div>
</body>
</html>
