<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gbedity · Sketch & Guess · in-game</title>
<link rel="stylesheet" href="_foundation.css" />
<style>
  body { padding: 40px; background: var(--canvas); min-height: 100vh; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .scene-h {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
    margin: 0 0 14px;
  }
  .id-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .id-num {
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft-display);
    font-weight: 600; font-size: 28px; color: var(--special);
    letter-spacing: -0.02em; line-height: 1; opacity: 0.55;
  }
  .id-meta {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
  }

  .split {
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px;
  }
  .canvas-card {
    background: var(--surface); border-radius: 22px; overflow: hidden;
  }
  .drawer-strip {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px;
    border-bottom: 1px solid var(--ink-5);
  }
  .av {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--special); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 17px; flex-shrink: 0;
  }
  .av.b1 { background: var(--stage); }
  .av.b3 { background: var(--info); color: var(--ink); }
  .av.b4 { background: var(--accent); }
  .av-sm { width: 32px; height: 32px; font-size: 13px; }
  .drawer-strip .drawer {
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft);
    font-weight: 600; font-size: 20px; color: var(--ink);
  }
  .drawer-strip .timer-small {
    margin-left: auto;
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft);
    font-weight: 600; font-variant-numeric: tabular-nums;
    font-size: 32px; color: var(--ink); letter-spacing: -0.02em;
  }
  .canvas-surface {
    height: 440px; background: #FCFDFC; position: relative; overflow: hidden;
  }
  .canvas-surface .sk {
    position: absolute;
    stroke: var(--ink); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round;
    fill: none;
  }
  .canvas-surface .sk-orange { stroke: var(--accent); }
  .canvas-surface .word-blanks {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px;
    font-family: var(--sans); font-weight: 800; font-size: 24px;
    letter-spacing: 0.4em; color: var(--ink-3);
  }
  .guess-card {
    background: var(--surface); border-radius: 22px; padding: 22px;
  }
  .guess-card .label {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 14px;
  }
  .guess-row {
    display: grid; grid-template-columns: 28px 1fr auto;
    align-items: center; gap: 12px;
    padding: 10px 0;
  }
  .guess-row + .guess-row { border-top: 1px dashed var(--ink-5); }
  .guess-row .rank {
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft);
    font-weight: 600; font-size: 15px; color: var(--ink-3);
  }
  .guess-row .guess-text {
    font-weight: 700; font-size: 16px; color: var(--ink);
  }
  .guess-row .guesser {
    font-size: 12px; color: var(--ink-3);
  }
  .guess-row .guess-text.cold { color: var(--ink-3); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">

  <p class="scene-h">Surface · Sketch & Guess · in-game (display TV)</p>

  <div class="id-header">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span class="id-num">15</span>
      <span class="id-meta">Sketch & Guess · round 4</span>
    </div>
    <span class="pill pill-special">Ada drawing</span>
  </div>

  <div class="split">
    <div class="canvas-card">
      <div class="drawer-strip">
        <div class="av">A</div>
        <div class="drawer">Ada</div>
        <div class="timer-small">0:38</div>
      </div>
      <div class="canvas-surface">
        <svg class="sk" style="left: 90px; top: 70px;" width="320" height="260" viewBox="0 0 320 260">
          <path d="M30 130 L160 30 L290 130"/>
          <path d="M60 128 L60 240 L260 240 L260 128"/>
          <path d="M120 240 L120 170 L200 170 L200 240"/>
          <path d="M150 210 L155 210" />
        </svg>
        <svg class="sk sk-orange" style="left: 320px; top: 100px;" width="100" height="50" viewBox="0 0 100 50">
          <path d="M5 38 Q50 6 95 38"/>
        </svg>
        <div class="word-blanks">_ _ _ _ _</div>
      </div>
    </div>
    <div class="guess-card">
      <div class="label">Live guesses · ranked by closeness</div>
      <div class="guess-row">
        <div class="rank">01</div>
        <div class="guess-text">house</div>
        <div class="guesser">Tobi · 0:12</div>
      </div>
      <div class="guess-row">
        <div class="rank">02</div>
        <div class="guess-text">home</div>
        <div class="guesser">Funmi · 0:08</div>
      </div>
      <div class="guess-row">
        <div class="rank">03</div>
        <div class="guess-text">villa</div>
        <div class="guesser">Tobi · 0:04</div>
      </div>
      <div class="guess-row">
        <div class="rank">04</div>
        <div class="guess-text cold">cabin</div>
        <div class="guesser">Kemi · 0:21</div>
      </div>
      <div class="guess-row">
        <div class="rank">05</div>
        <div class="guess-text cold">church</div>
        <div class="guesser">Funmi · 0:15</div>
      </div>
      <div class="guess-row">
        <div class="rank">06</div>
        <div class="guess-text cold">cottage</div>
        <div class="guesser">Kemi · 0:09</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
