<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gbedity · Word Bomb · in-game</title>
<link rel="stylesheet" href="_foundation.css" />
<style>
  body { padding: 40px; background: var(--canvas); min-height: 100vh; }
  .wrap { max-width: 880px; margin: 0 auto; }
  .scene-h {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
    margin: 0 0 14px;
  }
  .card { background: var(--surface); border-radius: 28px; padding: 36px 32px 32px; text-align: center; }
  .id-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .id-left { display: flex; align-items: center; gap: 10px; }
  .id-num {
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft-display);
    font-weight: 600; font-size: 28px; color: var(--action);
    letter-spacing: -0.02em; line-height: 1; opacity: 0.55;
  }
  .id-meta {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
  }
  .timer-hero {
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft-display);
    font-weight: 600; font-variant-numeric: tabular-nums;
    font-size: 140px; line-height: 0.92; letter-spacing: -0.05em;
    color: var(--danger);
    margin: 0;
  }
  .turn-line {
    font-family: var(--serif); font-variation-settings: var(--fraunces-soft);
    font-weight: 500; font-size: 28px; color: var(--ink-2);
    margin: 14px 0 0;
  }
  .turn-line strong { color: var(--ink); font-weight: 600; }
  .category-line {
    font-family: var(--sans); font-weight: 700; font-size: 15px;
    color: var(--ink-3); margin: 6px 0 32px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .said-label {
    font-family: var(--sans); font-weight: 800; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 12px;
  }
  .said-list {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .said-pill {
    background: var(--canvas); color: var(--ink);
    border-radius: var(--r-pill);
    padding: 8px 16px;
    font-weight: 700; font-size: 14px;
  }
  .said-pill.eliminated {
    background: var(--danger-soft); color: var(--danger-deep);
    text-decoration: line-through;
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="scene-h">Surface · Word Bomb · in-game (display TV)</p>

  <div class="card">
    <div class="id-header">
      <div class="id-left">
        <span class="id-num">06</span>
        <span class="id-meta">Word Bomb · round 2</span>
      </div>
      <span class="pill pill-action">3 left</span>
    </div>
    <p class="timer-hero">04</p>
    <p class="turn-line"><strong>Tobi's</strong> turn</p>
    <p class="category-line">Foods · starts with A</p>
    <div class="said-label">Already said</div>
    <div class="said-list">
      <span class="said-pill">amala</span>
      <span class="said-pill">akara</span>
      <span class="said-pill">apple</span>
      <span class="said-pill">avocado</span>
      <span class="said-pill eliminated">— Kemi out</span>
    </div>
  </div>

</div>
</body>
</html>
