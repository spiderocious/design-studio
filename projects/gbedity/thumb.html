<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gbedity · thumb</title>
<style>
  /* Self-contained thumbnail. Renders inside an iframe in the gallery.
     Shows the signature stage-frame celebration moment at small scale —
     the brand's most distinctive object: cobalt stage frame around a
     canvas-mint zone holding a white card with the orange winner bar. */

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..700,100&family=Nunito:wght@400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #C8E8DA;
    font-family: 'Nunito', system-ui, sans-serif;
    color: #1F6B4A;
    overflow: hidden;
  }

  .frame {
    height: 100%;
    padding: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .stage {
    width: 100%; height: 100%;
    background: #2D5BFF;
    border-radius: 14px;
    padding: 6px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .strip {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 4px 4px;
  }
  .wordmark {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'SOFT' 100, 'opsz' 48;
    font-weight: 700; color: #fff;
    font-size: 11px; letter-spacing: -0.01em;
  }
  .stage-meta {
    color: rgba(255,255,255,0.78);
    font-size: 7px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
  }

  .inset {
    flex: 1;
    background: #C8E8DA;
    border-radius: 10px;
    padding: 8px;
    display: flex; flex-direction: column; gap: 6px;
    overflow: hidden;
  }

  .winner-bar {
    background: #FF8A2A;
    border-radius: 8px;
    padding: 8px 10px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .winner-left { display: flex; align-items: center; gap: 6px; }
  .crown {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'SOFT' 100, 'opsz' 48;
    font-weight: 600; color: #1F6B4A;
    font-size: 8px;
  }
  .av {
    width: 18px; height: 18px; border-radius: 50%;
    background: #2D5BFF; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 9px;
  }
  .name {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'SOFT' 100, 'opsz' 48;
    font-weight: 600; font-size: 11px; color: #1F6B4A;
  }
  .pts {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'SOFT' 100, 'opsz' 144;
    font-weight: 600; color: #1F6B4A;
    font-variant-numeric: tabular-nums;
    font-size: 18px; letter-spacing: -0.02em; line-height: 1;
  }

  .board {
    flex: 1;
    background: #fff;
    border-radius: 8px;
    padding: 6px 8px;
    display: flex; flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .row {
    display: grid; grid-template-columns: 12px 14px 1fr auto;
    align-items: center; gap: 6px;
    padding: 3px 0;
    border-top: 1px dashed #C7D6CF;
  }
  .row:first-child { border-top: 0; }
  .row .r {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'SOFT' 100, 'opsz' 48;
    font-weight: 600; font-size: 9px; color: #536A62;
    text-align: right;
  }
  .row .r.top { color: #E8731A; }
  .row .av-mini {
    width: 14px; height: 14px; border-radius: 50%;
    background: #FF8A2A; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 7px;
  }
  .row .av-mini.b1 { background: #2D5BFF; }
  .row .av-mini.b2 { background: #7B4FBF; }
  .row .av-mini.b3 { background: #5BC0EB; color: #1F6B4A; }
  .row .nm { font-weight: 700; font-size: 9px; color: #1F6B4A; }
  .row .sc {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'SOFT' 100, 'opsz' 48;
    font-weight: 600; font-variant-numeric: tabular-nums;
    font-size: 11px; color: #1F6B4A; letter-spacing: -0.01em;
  }
  .row .sc.win { color: #E8731A; }
</style>
</head>
<body>

<div class="frame">
  <div class="stage">
    <div class="strip">
      <span class="wordmark">Final scores</span>
      <span class="stage-meta">06 · WB</span>
    </div>
    <div class="inset">
      <div class="winner-bar">
        <div class="winner-left">
          <span class="crown">winner</span>
          <div class="av">A</div>
          <span class="name">Ada</span>
        </div>
        <span class="pts">1,420</span>
      </div>
      <div class="board">
        <div class="row"><span class="r top">1</span><span class="av-mini">A</span><span class="nm">Ada</span><span class="sc win">1,420</span></div>
        <div class="row"><span class="r">2</span><span class="av-mini b1">T</span><span class="nm">Tobi</span><span class="sc">1,180</span></div>
        <div class="row"><span class="r">3</span><span class="av-mini b3">F</span><span class="nm">Funmi</span><span class="sc">940</span></div>
        <div class="row"><span class="r">4</span><span class="av-mini b2">K</span><span class="nm">Kemi</span><span class="sc">720</span></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
