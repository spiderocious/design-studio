<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxLens NG — soft Scandinavian, clay</title>
<link rel="stylesheet" href="preview/_foundation.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--paper); }

  .shell { display: grid; grid-template-columns: 286px 1fr; height: 100vh; }

  .toc {
    background: var(--paper);
    border-right: 1px solid var(--edge);
    padding: 30px 26px 20px;
    overflow: auto;
    display: flex; flex-direction: column;
  }
  .brand { display:flex; align-items:center; gap:9px; }
  .brand .glyph { width:30px; height:30px; border-radius:8px; background:var(--clay-500); display:grid; place-items:center; color:#fff; font-size:15px; font-family:var(--mono); }
  .ttl { font-family: var(--serif); font-size: 26px; font-weight: 600; letter-spacing: var(--track-h); line-height: 1; margin: 0; }
  .ttl .ng { font-size:12px; font-weight:600; color:var(--ink-4); letter-spacing:.08em; }
  .vol { font-family: var(--sans); font-size: 11px; color: var(--ink-3); margin-top: 10px; letter-spacing: 0.02em; line-height:1.5; }

  .toc-search { margin: 20px 0 8px; }
  .toc-search input {
    width: 100%; background: transparent; border: 0;
    border-bottom: 1px solid var(--ink-3); height: 30px;
    font-family: var(--sans); font-size: 13px; color: var(--ink);
    outline: none; padding: 0 0 4px;
  }
  .toc-search input:focus { border-bottom-color: var(--clay-500); }
  .toc-search input::placeholder { color: var(--ink-4); letter-spacing: 0.06em; font-size: 12px; }

  .nav { flex: 1; padding: 0; margin: 0; list-style: none; }
  .group { margin-top: 22px; }
  .group:first-child { margin-top: 8px; }
  .group-h {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--sans); font-size: 10px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600;
    padding-bottom: 8px; margin-bottom: 4px;
  }
  .group-h .n { color: var(--ink); }
  .group-h .l { flex: 1; height: 1px; background: var(--hair); }

  .item {
    display: flex; align-items: baseline; gap: 10px; padding: 5px 0;
    font-family: var(--sans); font-size: 13px; color: var(--ink-2);
    text-decoration: none; cursor: pointer; line-height: 1.45;
  }
  .item .dot { width: 5px; height: 5px; border-radius: 50%; background: transparent; border: 1px solid var(--ink-4); flex-shrink: 0; transform: translateY(-3px); }
  .item:hover { color: var(--ink); }
  .item.on { color: var(--ink); font-weight: 600; }
  .item.on .dot { background: var(--clay-500); border-color: var(--clay-500); }

  .meta {
    font-family: var(--sans); font-size: 10px; color: var(--ink-3);
    margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--hair);
    line-height: 1.8; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600;
  }

  .stage { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--paper); }
  .head {
    flex-shrink: 0; padding: 18px 28px; border-bottom: 1px solid var(--edge);
    display: flex; align-items: baseline; gap: 16px; background: var(--paper);
  }
  .crumb { font-family: var(--sans); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600; }
  .crumb .cur { color: var(--ink); }
  .head .gap { flex: 1; }
  .head a {
    font-family: var(--sans); font-size: 11px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.16em; text-decoration: none; font-weight: 600;
    border-bottom: 1px solid transparent; padding-bottom: 2px;
  }
  .head a:hover { color: var(--ink); border-bottom-color: var(--clay-500); }

  .frame { flex: 1; min-height: 0; background: var(--paper-deep); }
  .frame iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--paper); }
</style>
</head>
<body>

<div class="shell">

  <aside class="toc">
    <div class="brand">
      <span class="glyph">₦</span>
      <h1 class="ttl">TaxLens <span class="ng">NG</span></h1>
    </div>
    <div class="vol">Personal income tax under the NTA 2025 · vol. 1 · soft Scandinavian, clay</div>

    <div class="toc-search">
      <input id="filter" placeholder="Search…  ( / )" autocomplete="off">
    </div>

    <nav id="nav" class="nav"></nav>

    <div class="meta">
      Light only · clay #C2613A<br>
      Estimate, not advice
    </div>
  </aside>

  <main class="stage">
    <div class="head">
      <div class="crumb" id="crumb">
        <span>Part I · Foundation</span>
        <span style="margin: 0 8px; color: var(--ink-4)">/</span>
        <span class="cur">Palette</span>
      </div>
      <div class="gap"></div>
      <a href="../../index.html">← Playground</a>
      <a href="README.md" target="_blank">Readme</a>
      <a id="popout" href="#" target="_blank">Open ↗</a>
    </div>
    <div class="frame">
      <iframe id="preview" title="TaxLens specimen"></iframe>
    </div>
  </main>

</div>

<script>
  const PARTS = [
    { id: "I",   title: "Foundation", items: [
        { name: "Palette",                 file: "preview/01-palette.html" },
        { name: "Type",                    file: "preview/02-type.html" },
        { name: "Spacing & geometry",      file: "preview/03-geometry.html" },
        { name: "Motion",                  file: "preview/04-motion.html" },
    ]},
    { id: "II",  title: "Primitives", items: [
        { name: "Buttons",                 file: "preview/10-buttons.html" },
        { name: "Inputs · the ₦ field",    file: "preview/11-inputs.html" },
        { name: "Selection · profile",     file: "preview/12-selection.html" },
        { name: "Date & tax year",         file: "preview/13-datetime.html" },
        { name: "Bank-statement upload",   file: "preview/14-specialized.html" },
    ]},
    { id: "III", title: "Data & state", items: [
        { name: "Tables · extracted inflows", file: "preview/20-tables.html" },
        { name: "Band breakdown · signature", file: "preview/21-band-breakdown.html" },
        { name: "Old vs new comparison",   file: "preview/22-comparison.html" },
        { name: "Charts",                  file: "preview/23-charts.html" },
        { name: "Progress",                file: "preview/24-progress.html" },
        { name: "Skeletons & empty",       file: "preview/25-skeletons-empty.html" },
        { name: "Status & pills",          file: "preview/26-avatars-pills.html" },
        { name: "Cards",                   file: "preview/27-cards.html" },
        { name: "Tooltips & popovers",     file: "preview/28-tooltips.html" },
        { name: "Navigation",              file: "preview/29-navigation.html" },
    ]},
    { id: "IV",  title: "Surfaces", items: [
        { name: "Landing & income input",  file: "preview/30-landing.html" },
        { name: "Tax result · the hero",   file: "preview/31-result.html" },
        { name: "What changed for you",    file: "preview/32-what-changed.html" },
        { name: "Ask TaxLens · AI follow-up", file: "preview/33-ai-followup.html" },
    ]},
    { id: "V",   title: "Overlays & system", items: [
        { name: "Modals · the critical wipe", file: "preview/40-modals.html" },
        { name: "Toasts, banners, callouts",  file: "preview/41-feedback.html" },
        { name: "AI assist · methodology",    file: "preview/42-cross.html" },
        { name: "Iconography",             file: "preview/43-icons.html" },
    ]},
  ];

  const nav = document.getElementById('nav');
  const filter = document.getElementById('filter');
  const iframe = document.getElementById('preview');
  const crumb = document.getElementById('crumb');
  const popout = document.getElementById('popout');
  let currentFile = null;

  function render(query = "") {
    nav.innerHTML = "";
    const q = query.trim().toLowerCase();
    PARTS.forEach(part => {
      const items = part.items.filter(it => !q || it.name.toLowerCase().includes(q));
      if (!items.length) return;
      const g = document.createElement('div');
      g.className = 'group';
      g.innerHTML = `<div class="group-h"><span class="n">${part.id}</span><span>${part.title}</span><span class="l"></span></div>`;
      items.forEach(it => {
        const a = document.createElement('a');
        a.className = 'item' + (it.file === currentFile ? ' on' : '');
        a.innerHTML = `<span class="dot"></span><span>${it.name}</span>`;
        a.addEventListener('click', e => { e.preventDefault(); load(it, part); });
        g.appendChild(a);
      });
      nav.appendChild(g);
    });
  }

  function load(item, part) {
    currentFile = item.file;
    iframe.src = item.file;
    popout.href = item.file;
    crumb.innerHTML = `<span>Part ${part.id} · ${part.title}</span><span style="margin:0 8px;color:var(--ink-4)">/</span><span class="cur">${item.name}</span>`;
    [...document.querySelectorAll('.item')].forEach(el => {
      el.classList.toggle('on', el.querySelector('span:last-child')?.textContent.trim() === item.name);
    });
    location.hash = encodeURIComponent(item.file);
  }

  filter.addEventListener('input', e => render(e.target.value));
  filter.addEventListener('keydown', e => {
    const items = [...document.querySelectorAll('.item')];
    const idx = items.findIndex(a => a.classList.contains('on'));
    if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.click(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); items[Math.max(idx-1, 0)]?.click(); }
    else if (e.key === 'Enter') { items.find(a => a.classList.contains('on'))?.click(); }
    else if (e.key === 'Escape') { filter.value = ''; render(); }
  });
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== filter) { e.preventDefault(); filter.focus(); }
  });

  const hash = decodeURIComponent(location.hash.slice(1));
  let booted = false;
  if (hash) {
    PARTS.forEach(p => p.items.forEach(it => { if (it.file === hash) { render(); load(it, p); booted = true; } }));
  }
  if (!booted) { render(); load(PARTS[0].items[0], PARTS[0]); }
</script>

</body>
</html>
