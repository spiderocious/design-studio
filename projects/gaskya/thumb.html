<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GasKya · thumb</title>
<style>
  /* Self-contained tile. Shows the signature moment: the worked-solution
     coach voice + the answer bubble (your wrong pick vs the right key)
     + the physical key button, at small scale. */
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@500;600&family=JetBrains+Mono:wght@500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #F6F1EC; font-family: 'Inter', system-ui, sans-serif; color: #2C2620; overflow: hidden; }
  .frame { height: 100%; padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 7px; letter-spacing: 0.18em; text-transform: uppercase; color: #7C7264; }
  .lead { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; line-height: 1.22; letter-spacing: -0.01em; }
  .lead b { color: #5A2A4D; }
  .bubbles { display: flex; gap: 6px; align-items: center; }
  .bub { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #CDBFB1; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center; color: #7C7264; background: #fff; }
  .bub.right { border-color: #4E6B4F; color: #4E6B4F; box-shadow: 0 0 0 2px #ECF1EA; }
  .bub.was { border-color: #A1281E; color: #A1281E; text-decoration: line-through; }
  .key { align-self: flex-start; font-family: 'Inter'; font-weight: 600; font-size: 11px; color: #fff; background: #5A2A4D; border-radius: 999px; padding: 7px 14px; box-shadow: 0 3px 0 0 #421E39; }
  .row { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="frame">
  <div class="eyebrow">Numerical · number series</div>
  <div class="lead">You were one step early — <b>here's the method.</b></div>
  <div class="row">
    <div class="bubbles"><span class="bub">A</span><span class="bub was">B</span><span class="bub right">C</span><span class="bub">D</span></div>
  </div>
  <div class="key">Drill this</div>
</div>
</body>
</html>
