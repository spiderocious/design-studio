<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medcord — surgical-paper</title>
<link rel="stylesheet" href="preview/_foundation.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--paper); }

  .shell {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    column-gap: 0;
  }

  /* ---- Left index ---- */
  .toc {
    background: var(--paper);
    border-right: 1px solid var(--ink);
    padding: 32px 28px 20px;
    overflow: auto;
    display: flex; flex-direction: column;
  }
  .ttl {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: var(--track-display);
    line-height: 1;
    margin: 0;
  }
  .vol {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3); margin-top: 6px;
  }
  .meta {
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
    margin-top: 24px; padding-top: 18px;
    border-top: 1px solid var(--ink);
    line-height: 1.7;
    text-transform: uppercase; letter-spacing: 0.16em;
  }

  .toc-search {
    margin: 22px 0 8px;
  }
  .toc-search input {
    width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--ink-3);
    height: 28px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    outline: none;
    padding: 0 0 4px;
    letter-spacing: 0;
  }
  .toc-search input:focus { border-bottom-color: var(--ink); }
  .toc-search input::placeholder { color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.12em; font-size: 10px; }

  .nav { flex: 1; padding: 0; margin: 0; list-style: none; }

  .group {
    margin-top: 22px;
  }
  .group:first-child { margin-top: 8px; }
  .group-h {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding-bottom: 6px;
    margin-bottom: 4px;
  }
  .group-h .n { color: var(--ink); }
  .group-h .l { flex: 1; height: 1px; background: var(--hair); }

  .item {
    display: flex; align-items: baseline; gap: 10px;
    padding: 4px 0;
    font-family: var(--sans); font-size: 13px;
    color: var(--ink-2);
    text-decoration: none;
    cursor: pointer;
    line-height: 1.45;
  }
  .item .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: transparent; border: 1px solid var(--ink-4);
    flex-shrink: 0; transform: translateY(-3px);
  }
  .item:hover { color: var(--ink); }
  .item.on { color: var(--ink); font-weight: 500; }
  .item.on .dot { background: var(--ink); border-color: var(--ink); }

  /* ---- Stage ---- */
  .stage {
    display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    background: var(--paper);
  }

  .head {
    flex-shrink: 0;
    padding: 18px 28px;
    border-bottom: 1px solid var(--ink);
    display: flex; align-items: baseline; gap: 16px;
    background: var(--paper);
  }
  .crumb {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }
  .crumb .cur { color: var(--ink); }
  .head .gap { flex: 1; }
  .head a {
    font-family: var(--mono); font-size: 11px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.16em; text-decoration: none;
    border-bottom: 1px solid transparent; padding-bottom: 2px;
  }
  .head a:hover { color: var(--ink); border-bottom-color: var(--ink); }

  .frame {
    flex: 1;
    min-height: 0;
    background: var(--paper-deep);
    border-left: 1px solid var(--paper);
  }
  .frame iframe {
    width: 100%; height: 100%; border: 0; display: block;
    background: var(--paper);
  }

  /* ---- Welcome ---- */
  .welcome-shell {
    height: 100%; overflow: auto; padding: 64px 88px;
    background: var(--paper);
  }
  .welcome-shell h1 {
    font-family: var(--serif);
    font-size: 64px; font-weight: 500;
    letter-spacing: -0.025em; line-height: 1.0;
    margin: 0 0 20px; max-width: 16ch;
  }
  .welcome-shell .lede {
    font-family: var(--serif); font-style: italic;
    font-size: 20px; color: var(--ink-3);
    line-height: 1.5; max-width: 60ch; margin: 0 0 48px;
  }
  .welcome-shell .grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px; max-width: 1000px;
  }
  .welcome-shell .card {
    border: 1px solid var(--hair); padding: 24px;
    background: var(--paper-deep);
  }
  .welcome-shell .card .ix {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-3); margin-bottom: 12px;
  }
  .welcome-shell .card h3 {
    font-family: var(--serif); font-size: 19px; font-weight: 500;
    margin: 0 0 8px; letter-spacing: -0.01em;
  }
  .welcome-shell .card p {
    font-family: var(--sans); font-size: 13px;
    color: var(--ink-3); line-height: 1.55; margin: 0;
  }
  .welcome-shell .foot {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-3); margin-top: 48px;
  }

</style>
</head>
<body>

<div class="shell">

  <aside class="toc">
    <h1 class="ttl">Medcord</h1>
    <div class="vol">A clinical record system · vol. 1 · surgical-paper</div>

    <div class="toc-search">
      <input id="filter" placeholder="Search…" autocomplete="off">
    </div>

    <nav id="nav" class="nav"></nav>

    <div class="meta">
      St. Catherine's General<br>
      Multi-tenant · v 0.2
    </div>
  </aside>

  <main class="stage">
    <div class="head">
      <div class="crumb" id="crumb">
        <span>Part 1 · Foundation</span>
        <span style="margin: 0 8px; color: var(--ink-4)">/</span>
        <span class="cur">Welcome</span>
      </div>
      <div class="gap"></div>
      <a href="../../index.html">← Playground</a>
      <a href="README.md" target="_blank">Readme</a>
      <a href="original-prompt.md" target="_blank">Brief</a>
      <a id="popout" href="#" target="_blank">Open ↗</a>
    </div>
    <div class="frame">
      <iframe id="preview" title="Medcord specimen"></iframe>
      <div id="welcome-pane" style="display:none;height:100%;overflow:auto"></div>
    </div>
  </main>

</div>

<script>
  const PARTS = [
    { id: "I",   title: "Foundation", items: [
        { name: "Welcome",                    file: "" },
        { name: "Palette",                    file: "preview/01-palette.html" },
        { name: "Type",                       file: "preview/02-type.html" },
        { name: "Spacing & geometry",         file: "preview/03-geometry.html" },
        { name: "Motion",                     file: "preview/04-motion.html" },
    ]},
    { id: "II",  title: "Primitives", items: [
        { name: "Buttons",                    file: "preview/10-buttons.html" },
        { name: "Inputs · vitals & dosage",   file: "preview/11-inputs.html" },
        { name: "Selection",                  file: "preview/12-selection.html" },
        { name: "Date & time",                file: "preview/13-datetime.html" },
        { name: "Specialized inputs",         file: "preview/14-specialized.html" },
    ]},
    { id: "III", title: "Data & state", items: [
        { name: "Tables",                     file: "preview/20-tables.html" },
        { name: "Lab specimen",               file: "preview/21-lab.html" },
        { name: "Vitals · MAR",               file: "preview/22-vitals.html" },
        { name: "Charts",                     file: "preview/23-charts.html" },
        { name: "Progress",                   file: "preview/24-progress.html" },
        { name: "Skeletons & empty",          file: "preview/25-skeletons-empty.html" },
        { name: "Avatars · pills · status",   file: "preview/26-avatars-pills.html" },
        { name: "Cards",                      file: "preview/27-cards.html" },
        { name: "Tooltips · hovercards",      file: "preview/28-tooltips.html" },
        { name: "Navigation · shell · ⌘K",    file: "preview/29-navigation.html" },
    ]},
    { id: "IV",  title: "Surfaces", items: [
        { name: "Patient banner",             file: "preview/30-banner.html" },
        { name: "Bed board",                  file: "preview/31-bed-board.html" },
        { name: "EMR · chart open",           file: "preview/32-emr.html" },
        { name: "Telehealth · video visit",   file: "preview/33-telehealth.html" },
        { name: "Equipment · biomed log",     file: "preview/34-equipment.html" },
        { name: "Staff & schedule",           file: "preview/35-staff.html" },
        { name: "Patient registration",       file: "preview/36-registration.html" },
    ]},
    { id: "V",   title: "Overlays & system", items: [
        { name: "Modals",                     file: "preview/40-modals.html" },
        { name: "Toasts · banners · alerts",  file: "preview/41-feedback.html" },
        { name: "Cross-record patterns",      file: "preview/42-cross.html" },
        { name: "Iconography",                file: "preview/43-icons.html" },
    ]},
  ];

  const WELCOME = `
    <div class="welcome-shell">
      <h1>A record system that clinicians trust.</h1>
      <p class="lede">Medcord is an enterprise hospital-management system — patients, staff, EMR, equipment. The stance is surgical paper: a warm bone canvas, apothecary green as the only accent, hairlines instead of shadows. Calm by default; alarming only when warranted.</p>
      <div class="grid">
        <div class="card">
          <div class="ix">Foundation</div>
          <h3>The material</h3>
          <p>Palette, type, geometry, motion. Serif for thinking, mono for the record number, one accent only. Critical-red is reserved for the life-threatening.</p>
        </div>
        <div class="card">
          <div class="ix">Primitives &amp; data</div>
          <h3>The instruments</h3>
          <p>Buttons, inputs, the lab specimen, vitals and the MAR. Tabular figures everywhere a number carries clinical weight.</p>
        </div>
        <div class="card">
          <div class="ix">Surfaces</div>
          <h3>The scenes</h3>
          <p>Start with the <strong>Patient banner</strong>, then the <strong>Bed board</strong> and <strong>EMR · chart open</strong>. Each is a real situation, not a catalogue of states.</p>
        </div>
      </div>
      <div class="foot">St. Catherine's General · use the search to filter</div>
    </div>
  `;
  
  const nav = document.getElementById('nav');
  const filter = document.getElementById('filter');
  const iframe = document.getElementById('preview');
  const welcomePane = document.getElementById('welcome-pane');
  const crumb = document.getElementById('crumb');
  const popout = document.getElementById('popout');

  let currentFile = null;

  function render(query = "") {
    nav.innerHTML = "";
    const q = query.trim().toLowerCase();
    PARTS.forEach(part => {
      const items = part.items.filter(it => !q || it.name.toLowerCase().includes(q));
      if (!items.length) return;
      const g = document.createElement('div');
      g.className = 'group';
      g.innerHTML = `<div class="group-h"><span class="n">${part.id}</span><span>${part.title}</span><span class="l"></span></div>`;
      items.forEach(it => {
        const a = document.createElement('a');
        a.className = 'item' + (it.file === currentFile ? ' on' : '');
        a.innerHTML = `<span class="dot"></span><span>${it.name}${it.stub ? ' <span style="color:var(--ink-4);font-size:10px">·</span>' : ''}</span>`;
        a.addEventListener('click', e => { e.preventDefault(); load(it, part); });
        g.appendChild(a);
      });
      nav.appendChild(g);
    });
  }

  function load(item, part) {
    currentFile = item.file;
    if (item.file) {
      // Specimen: show the iframe, hide the welcome pane.
      welcomePane.style.display = 'none';
      iframe.style.display = 'block';
      iframe.src = item.file;
      popout.href = item.file;
      popout.style.opacity = '1';
      popout.style.pointerEvents = 'auto';
    } else {
      // Welcome: render in-page so the parent stylesheet applies
      // (an iframe srcdoc can't see this page's CSS).
      iframe.removeAttribute('src');
      iframe.style.display = 'none';
      welcomePane.innerHTML = WELCOME;
      welcomePane.style.display = 'block';
      popout.href = '#';
      popout.style.opacity = '0.4';
      popout.style.pointerEvents = 'none';
    }
    crumb.innerHTML = `<span>Part ${part.id} · ${part.title}</span><span style="margin:0 8px;color:var(--ink-4)">/</span><span class="cur">${item.name}</span>`;
    document.querySelectorAll('.item').forEach(el => el.classList.toggle('on', false));
    [...document.querySelectorAll('.item')].forEach(el => {
      if (el.querySelector('span:last-child')?.textContent.trim().startsWith(item.name)) el.classList.add('on');
    });
    if (item.file) location.hash = encodeURIComponent(item.file);
    else location.hash = '';
  }

  filter.addEventListener('input', e => render(e.target.value));
  filter.addEventListener('keydown', e => {
    const items = [...document.querySelectorAll('.item')];
    const idx = items.findIndex(a => a.classList.contains('on'));
    if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.click(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); items[Math.max(idx-1, 0)]?.click(); }
    else if (e.key === 'Enter') { items.find(a => a.classList.contains('on'))?.click(); }
    else if (e.key === 'Escape') { filter.value = ''; render(); }
  });
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== filter) {
      e.preventDefault(); filter.focus();
    }
  });

  // Boot
  const hash = decodeURIComponent(location.hash.slice(1));
  let booted = false;
  if (hash) {
    PARTS.forEach(p => p.items.forEach(it => {
      if (it.file === hash) { render(); load(it, p); booted = true; }
    }));
  }
  if (!booted) { render(); load(PARTS[0].items[0], PARTS[0]); }
</script>

</body>
</html>
