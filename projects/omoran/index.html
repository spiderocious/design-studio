<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omoran — coral console</title>
<link rel="stylesheet" href="preview/_foundation.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--paper); }

  .shell { display: grid; grid-template-columns: 282px 1fr; height: 100vh; }

  /* ---- Left index ---- */
  .toc {
    background: var(--paper-deep);
    border-right: 1px solid var(--ink);
    padding: 28px 26px 20px;
    overflow: auto;
    display: flex; flex-direction: column;
  }
  .ttl { font-family: var(--mono); font-size: 21px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; margin: 0; }
  .ttl .dot { color: var(--coral-500); }
  .vol { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); margin-top: 7px; letter-spacing: 0.02em; }

  .toc-search { margin: 22px 0 8px; }
  .toc-search input {
    width: 100%; background: var(--panel); border: 1px solid var(--edge-2);
    border-radius: var(--r-sm); height: 30px;
    font-family: var(--mono); font-size: 12px; color: var(--ink);
    outline: none; padding: 0 10px; letter-spacing: 0;
  }
  .toc-search input:focus { border-color: var(--coral-500); box-shadow: 0 0 0 3px var(--coral-edge); }
  .toc-search input::placeholder { color: var(--ink-4); }

  .nav { flex: 1; padding: 0; margin: 0; list-style: none; }
  .group { margin-top: 20px; }
  .group:first-child { margin-top: 6px; }
  .group-h {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--mono); font-size: 9.5px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.16em;
    padding-bottom: 6px; margin-bottom: 4px;
  }
  .group-h .n { color: var(--coral-700); }
  .group-h .l { flex: 1; height: 1px; background: var(--hair-2); }

  .item {
    display: flex; align-items: baseline; gap: 10px;
    padding: 4px 0; font-family: var(--sans); font-size: 13px;
    color: var(--ink-2); text-decoration: none; cursor: pointer; line-height: 1.45;
  }
  .item .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: transparent; border: 1px solid var(--ink-4);
    flex-shrink: 0; transform: translateY(-3px);
  }
  .item:hover { color: var(--ink); }
  .item.on { color: var(--coral-700); font-weight: 600; }
  .item.on .dot { background: var(--coral-500); border-color: var(--coral-500); }

  .meta {
    font-family: var(--mono); font-size: 9.5px; color: var(--ink-3);
    margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--ink);
    line-height: 1.7; text-transform: uppercase; letter-spacing: 0.14em;
  }

  /* ---- Stage ---- */
  .stage { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--paper); }
  .head {
    flex-shrink: 0; padding: 16px 24px; border-bottom: 1px solid var(--ink);
    display: flex; align-items: baseline; gap: 16px; background: var(--paper);
  }
  .crumb { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.14em; }
  .crumb .cur { color: var(--ink); }
  .head .gap { flex: 1; }
  .head a {
    font-family: var(--mono); font-size: 11px; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.14em; text-decoration: none;
    border-bottom: 1px solid transparent; padding-bottom: 2px;
  }
  .head a:hover { color: var(--coral-700); border-bottom-color: var(--coral-500); }

  .frame { flex: 1; min-height: 0; background: var(--paper-deep); }
  .frame iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--paper); }
</style>
</head>
<body>
<div class="shell">
  <aside class="toc">
    <h1 class="ttl">omoran<span class="dot">.</span></h1>
    <div class="vol">Product analytics · vol. 1 · coral console</div>

    <div class="toc-search"><input id="filter" placeholder="Search…" autocomplete="off"></div>
    <nav id="nav" class="nav"></nav>

    <div class="meta">
      The AI analyst layer<br>
      Brutalist dossier · v 0.1
    </div>
  </aside>

  <main class="stage">
    <div class="head">
      <div class="crumb" id="crumb"><span>Part I · Foundation</span><span style="margin:0 8px;color:var(--ink-5)">/</span><span class="cur">Palette</span></div>
      <div class="gap"></div>
      <a href="../../index.html">← Playground</a>
      <a href="README.md" target="_blank">Readme</a>
      <a href="prd.md" target="_blank">Brief</a>
      <a id="popout" href="#" target="_blank">Open ↗</a>
    </div>
    <div class="frame"><iframe id="preview" title="Omoran specimen"></iframe></div>
  </main>
</div>

<script>
  const PARTS = [
    { id: "I", title: "Foundation", items: [
      { name: "Palette", file: "preview/01-palette.html" },
      { name: "Type", file: "preview/02-type.html" },
      { name: "Spacing & geometry", file: "preview/03-geometry.html" },
      { name: "Motion", file: "preview/04-motion.html" },
    ]},
    { id: "II", title: "Primitives", items: [
      { name: "Buttons", file: "preview/10-buttons.html" },
      { name: "Inputs · events, keys, SQL", file: "preview/11-inputs.html" },
      { name: "Selection", file: "preview/12-selection.html" },
      { name: "Date & time", file: "preview/13-datetime.html" },
      { name: "Specialized · SDK, schema, ask-bar", file: "preview/14-specialized.html" },
    ]},
    { id: "III", title: "Data & state", items: [
      { name: "Tables · events explorer", file: "preview/20-tables.html" },
      { name: "AI Insights panel", file: "preview/21-insights.html" },
      { name: "Active users & trends", file: "preview/22-trends.html" },
      { name: "Charts", file: "preview/23-charts.html" },
      { name: "Progress", file: "preview/24-progress.html" },
      { name: "Skeletons & empty", file: "preview/25-skeletons-empty.html" },
      { name: "Avatars · pills · status", file: "preview/26-avatars-pills.html" },
      { name: "Cards", file: "preview/27-cards.html" },
      { name: "Tooltips & hovercards", file: "preview/28-tooltips.html" },
      { name: "Navigation · shell · ⌘K", file: "preview/29-navigation.html" },
    ]},
    { id: "IV", title: "Surfaces", items: [
      { name: "Dashboard + AI panel", file: "preview/30-dashboard.html" },
      { name: "The Monday digest", file: "preview/31-digest.html" },
      { name: "Ask Omoran · NL → SQL", file: "preview/32-nl-query.html" },
      { name: "Anomaly drill-down", file: "preview/33-anomaly.html" },
      { name: "Connect your SDK", file: "preview/34-sdk-setup.html" },
    ]},
    { id: "V", title: "Overlays & system", items: [
      { name: "Modals · the critical idiom", file: "preview/40-modals.html" },
      { name: "Toasts · banners · alerts", file: "preview/41-feedback.html" },
      { name: "Cross-record patterns", file: "preview/42-cross.html" },
      { name: "Iconography", file: "preview/43-icons.html" },
    ]},
  ];

  const nav = document.getElementById('nav');
  const filter = document.getElementById('filter');
  const iframe = document.getElementById('preview');
  const crumb = document.getElementById('crumb');
  const popout = document.getElementById('popout');
  let currentFile = null;

  function render(query = "") {
    nav.innerHTML = ""; const q = query.trim().toLowerCase();
    PARTS.forEach(part => {
      const items = part.items.filter(it => !q || it.name.toLowerCase().includes(q));
      if (!items.length) return;
      const g = document.createElement('div'); g.className = 'group';
      g.innerHTML = `<div class="group-h"><span class="n">${part.id}</span><span>${part.title}</span><span class="l"></span></div>`;
      items.forEach(it => {
        const a = document.createElement('a');
        a.className = 'item' + (it.file === currentFile ? ' on' : '');
        a.innerHTML = `<span class="dot"></span><span>${it.name}</span>`;
        a.addEventListener('click', e => { e.preventDefault(); load(it, part); });
        g.appendChild(a);
      });
      nav.appendChild(g);
    });
  }

  function load(item, part) {
    currentFile = item.file;
    iframe.src = item.file;
    popout.href = item.file; popout.style.opacity = '1'; popout.style.pointerEvents = 'auto';
    crumb.innerHTML = `<span>Part ${part.id} · ${part.title}</span><span style="margin:0 8px;color:var(--ink-5)">/</span><span class="cur">${item.name}</span>`;
    [...document.querySelectorAll('.item')].forEach(el => el.classList.toggle('on', el.querySelector('span:last-child')?.textContent.trim() === item.name));
    location.hash = encodeURIComponent(item.file);
  }

  filter.addEventListener('input', e => render(e.target.value));
  filter.addEventListener('keydown', e => {
    const items = [...document.querySelectorAll('.item')];
    const idx = items.findIndex(a => a.classList.contains('on'));
    if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.click(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); items[Math.max(idx-1, 0)]?.click(); }
    else if (e.key === 'Escape') { filter.value = ''; render(); }
  });
  document.addEventListener('keydown', e => { if (e.key === '/' && document.activeElement !== filter) { e.preventDefault(); filter.focus(); } });

  const hash = decodeURIComponent(location.hash.slice(1));
  let booted = false;
  if (hash) { PARTS.forEach(p => p.items.forEach(it => { if (it.file === hash) { render(); load(it, p); booted = true; } })); }
  if (!booted) { render(); load(PARTS[0].items[0], PARTS[0]); }
</script>
</body>
</html>
