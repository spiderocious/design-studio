<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Omoran · thumb</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #F7F5F0; font-family: 'Inter', system-ui, sans-serif; color: #17150F; overflow: hidden; }
  .frame { height: 100%; padding: 15px 17px; display: flex; flex-direction: column; gap: 9px; justify-content: center; }
  .head-row { display: flex; align-items: baseline; gap: 8px; padding-bottom: 8px; border-bottom: 2px solid #17150F; }
  .wm { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .wm .dot { color: #E85D2A; }
  .meta { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; color: #5E574A; letter-spacing: 0.14em; text-transform: uppercase; margin-left: auto; }
  /* the signature artifact: an AI insight */
  .insight { background: #FFFFFF; border: 1px solid #ECE6DA; border-left: 3px solid #E85D2A; border-radius: 7px; padding: 11px 12px; margin-top: 2px; }
  .ihead { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 7px; font-weight: 700; letter-spacing: 0.08em; color: #fff; background: #E85D2A; padding: 2px 5px; border-radius: 3px; }
  .conf { margin-left: auto; display: flex; gap: 2.5px; }
  .conf .d { width: 4px; height: 4px; border-radius: 50%; background: #5E574A; }
  .conf .d.off { background: #DDD6C8; }
  .prose { font-family: 'Source Serif 4', Georgia, serif; font-size: 11px; line-height: 1.38; }
  .prose b { font-weight: 600; }
  .prose .num { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 10.5px; color: #A93A15; }
  .foot { margin-top: 8px; padding-top: 7px; border-top: 1px solid #ECE6DA; display: flex; align-items: center; gap: 8px; }
  .foot .q { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 600; color: #A93A15; }
  .foot .g { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; color: #5E574A; margin-left: auto; display: flex; align-items: center; gap: 4px; }
  .foot .g::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: #1A6E3C; }
  /* mini event row */
  .ev { display: grid; grid-template-columns: 14px 1fr auto; gap: 8px; align-items: center; padding: 4px 0; }
  .ev .t { font-family: 'JetBrains Mono', monospace; font-size: 7px; color: #B7B0A0; }
  .ev .n { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; }
  .ev .d { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 600; }
  .ev .d.up { color: #1A6E3C; }
  .ev .d.an { color: #A93A15; }
</style>
</head>
<body>
<div class="frame">
  <div class="head-row">
    <span class="wm">omoran<span class="dot">.</span></span>
    <span class="meta">PROD · 7D · ✦ ANALYST</span>
  </div>

  <div class="ev"><span class="t">01</span><span class="n">page_view</span><span class="d up">+6%</span></div>
  <div class="ev"><span class="t">03</span><span class="n">checkout_completed</span><span class="d an">−18% ⚑</span></div>

  <div class="insight">
    <div class="ihead">
      <span class="badge">⚑ ANOMALY</span>
      <span class="conf"><span class="d"></span><span class="d"></span><span class="d off"></span></span>
    </div>
    <div class="prose"><b>checkout_completed</b> fell <span class="num">18%</span> — almost all <b>Safari iOS</b>.</div>
    <div class="foot"><span class="q">↳ show the query</span><span class="g">28k events</span></div>
  </div>
</div>
</body>
</html>
